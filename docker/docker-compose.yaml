services:
  nginx:
    image: nginx:latest
    container_name: nginx
    volumes:
      - ./nginx/config/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8081:80"
    depends_on:
      - licence-connect
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://licence-connect:8080/healthcheck" ]
      interval: 1s
      timeout: 5s
      retries: 10

  licence-connect:
    image: ${LC_IMAGE}
    container_name: licence-connect
    env_file: ".env"
    user: "1002:1000"
    volumes:
      - ~/tmp/db:/workspace/tatata
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/workspace/data/database.h2;DB_CLOSE_ON_EXIT=FALSE
