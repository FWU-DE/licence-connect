services:

  mock-arix-server-accepting:
    build:
      context: arix-accepting
    ports:
      - "1234:1234"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:1234/healthcheck"]
      interval: 3s
      timeout: 2s
      retries: 50
      start_period: 5m

  mock-arix-server-rejecting:
    build:
      context: arix-rejecting
    ports:
      - "1235:1235"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:1235/healthcheck"]
      interval: 3s
      timeout: 2s
      retries: 50
      start_period: 5m

  mock-bilo-v2-server:
    build:
      context: bilo-v2
    ports:
      - "1236:1236"
    volumes:
      - ${SOURCES_DIR:-..}/test/resources:/app/resources
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:1236/healthcheck"]
      interval: 3s
      timeout: 2s
      retries: 50
      start_period: 5m

  mock-bilo-v1-server:
    build:
      context: bilo-v1
    ports:
      - "1237:1237"
#    volumes:
#      - ../test/resources/application.properties:/app/application.properties:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:1237/healthcheck"]
      interval: 3s
      timeout: 2s
      retries: 50
      start_period: 5m